## Key Schema

所有 Topic 使用相同的 Key 格式：

```
{tenantId}:{deviceId}
```

**示例**: `1001:2001`

---

## 消费者组

| Consumer Group | Topic | Purpose |
|----------------|-------|---------|
| realtime-consumer | device-events | 实时处理，写入 Redis |
| async-consumer | raw-events | 异步持久化到 MongoDB |
| parser-consumer | raw-events | 解析任务，写入 PostgreSQL |
| monitor-consumer | device-events | 监控指标收集 |

---

## 消息头（Headers）

| Header | Type | Description |
|--------|------|-------------|
| trace_id | String | 链路追踪ID |
| tenant_id | String | 租户ID |
| device_id | String | 设备ID |
| event_type | String | 事件类型 |
| source | String | 来源服务 |
| timestamp | Long | 消息生成时间戳 |

